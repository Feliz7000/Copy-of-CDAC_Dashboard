services:
  # PostgreSQL 16 — Authoritative data store
  db:
    image: postgres:16-alpine
    container_name: student_analytics_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analytics_network

  # Redis 7 — Cache & Celery broker
  redis:
    image: redis:7-alpine
    container_name: student_analytics_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - analytics_network

  # Django DRF Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: student_analytics_backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      ENV: ${ENV}
      POWERBI_CLIENT_ID: ${POWERBI_CLIENT_ID:-}
      POWERBI_TENANT_ID: ${POWERBI_TENANT_ID:-}
      POWERBI_CLIENT_SECRET: ${POWERBI_CLIENT_SECRET:-}
      POWERBI_WORKSPACE_ID: ${POWERBI_WORKSPACE_ID:-}
      POWERBI_REPORT_ID: ${POWERBI_REPORT_ID:-}
      POWERBI_ENABLE_RLS: ${POWERBI_ENABLE_RLS:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml_service:/ml_service
      - /app/.venv
    command: >
      sh -c "python manage.py check &&
             python manage.py migrate --no-input &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - analytics_network

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: student_analytics_celery_worker
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ENV: ${ENV}
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
      - /app/.venv
    command: celery -A config worker -l info --concurrency=4
    networks:
      - analytics_network

  # Celery Beat — Scheduled tasks
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: student_analytics_celery_beat
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      ENV: ${ENV}
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
      - /app/.venv
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - analytics_network

  # Flower — Celery monitoring
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: student_analytics_flower
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    depends_on:
      - celery_worker
    ports:
      - "5555:5555"
    command: celery -A config flower --port=5555
    networks:
      - analytics_network

  # FastAPI ML Service
  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: student_analytics_ml_service
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      - db
      - redis
    ports:
      - "8001:8001"
    volumes:
      - ./ml_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - analytics_network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student_analytics_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_ML_URL: http://localhost:8001
    depends_on:
      - backend
      - ml_service
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - analytics_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: student_analytics_nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - ml_service
      - frontend
    networks:
      - analytics_network

volumes:
  postgres_data:
  redis_data:

networks:
  analytics_network:
    driver: bridge
